name: Calculate AOSP LLVM Revision

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'LLVM Commit Hash or Tag (e.g., ca7933e)'
        required: true
        default: 'ca7933e'

jobs:
  calculate-r-number:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch LLVM History (Metadata Only)
        run: |
          # Use --filter=blob:none to get history without downloading the actual code/files
          git clone --filter=blob:none --no-checkout https://github.com/llvm/llvm-project.git llvm_metadata
          cd llvm_metadata
          # Fetch the specific commit to ensure it's in the local history
          git fetch origin ${{ github.event.inputs.commit_hash }}

      - name: Calculate Count
        id: get_count
        run: |
          cd llvm_metadata
          # Count all commits from the beginning of time to the target hash
          COUNT=$(git rev-list --count ${{ github.event.inputs.commit_hash }})
          echo "R_NUMBER=r$COUNT" >> $GITHUB_ENV
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          
      - name: Display Result
        run: |
          echo "--------------------------------------------------"
          echo "Target Commit: ${{ github.event.inputs.commit_hash }}"
          echo "AOSP Revision: ${{ env.R_NUMBER }}"
          echo "--------------------------------------------------"

      - name: Post to Summary
        run: |
          echo "### 🚀 AOSP LLVM Revision Calculated" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit Hash** | \`${{ github.event.inputs.commit_hash }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **AOSP Revision** | \`${{ env.R_NUMBER }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use this value for \`_svn_revision\` in \`android_version.py\`" >> $GITHUB_STEP_SUMMARY
