name: "LLVM Revision Analytics"

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch/Tag to analyze (e.g., main, aosp, llvmorg-22.1.8)'
        required: true
        default: 'main'

jobs:
  calculate-revision:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: "https://github.com/zrsx/llvm-project.git"
      # The canonical first commit of the LLVM Monorepo
      LLVM_ROOT_SHA: "25a17f61" 

    steps:
      - name: "Environment Setup"
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: "Download & Fix Google Toolchain Script"
        run: |
          # Fetch the script in Base64 from Google Source
          curl -sLo git_llvm_rev.py.b64 "https://android.googlesource.com/platform/external/toolchain-utils/+/refs/heads/main/llvm_tools/git_llvm_rev.py?format=TEXT"
          # Use Python to safely decode Base64 to avoid shell-specific corruptions
          python3 -c "import base64; data = open('git_llvm_rev.py.b64').read(); open('git_llvm_rev.py', 'wb').write(base64.b64decode(data))"
          chmod +x git_llvm_rev.py
          echo "✅ Toolchain script downloaded and verified."

      - name: "Clone Target Repository"
        run: |
          # We perform a partial clone (blobless) but fetch ALL commits
          # This is the fastest way to get full history for revision counting
          git clone --filter=blob:none ${{ env.TARGET_REPO }} workspace
          cd workspace
          git checkout ${{ github.event.inputs.target_branch }}
          echo "FULL_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: "Calculate AOSP Revision"
        id: calc
        working-directory: ./workspace
        run: |
          set +e # Allow manual error handling
          
          echo "Method 1: Attempting Google Toolchain script..."
          # The script needs to be run from the root of the repo
          # We point it to the parent directory where the script is located
          LLVM_REV=$(python3 ../git_llvm_rev.py --project llvm rev HEAD 2>/dev/null)
          
          if [[ -z "$LLVM_REV" || "$LLVM_REV" == *"None"* ]]; then
            echo "⚠️ Method 1 failed. Switching to Method 2: Git Distance Logic..."
            
            # Check if the canonical root exists in this fork
            if git cat-file -e ${{ env.LLVM_ROOT_SHA }}^{commit} 2>/dev/null; then
              ROOT=${{ env.LLVM_ROOT_SHA }}
            else
              echo "⚠️ Canonical root not found. Finding oldest ancestor..."
              ROOT=$(git rev-list --max-parents=0 HEAD | tail -n 1)
            fi
            
            # Count commits from root to HEAD
            COUNT=$(git rev-list --count $ROOT..HEAD)
            LLVM_REV="r$COUNT"
          fi
          
          echo "Final Calculated Revision: $LLVM_REV"
          echo "llvm_rev=$LLVM_REV" >> $GITHUB_OUTPUT

      - name: "Extract Metadata"
        id: meta
        working-directory: ./workspace
        run: |
          echo "date=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          echo "subject=$(git log -1 --format=%s | cut -c1-70)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --format=%an)" >> $GITHUB_OUTPUT

      - name: "Generate Summary Report"
        run: |
          echo "## 🛡️ LLVM Revision Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Attribute | Details |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **AOSP Revision** | \`${{ steps.calc.outputs.llvm_rev }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | \`zrsx/llvm-project\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reference** | \`${{ github.event.inputs.target_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | \`${{ env.SHORT_SHA }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit Date** | ${{ steps.meta.outputs.date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | ${{ steps.meta.outputs.author }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ steps.meta.outputs.subject }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> This revision was calculated by analyzing the commit distance from the LLVM monorepo base. Revision numbers correlate to the legacy SVN increment system used by AOSP." >> $GITHUB_STEP_SUMMARY

      - name: "Final Console Log"
        run: |
          echo "Calculation Complete."
          echo "Target: ${{ github.event.inputs.target_branch }} at ${{ env.SHORT_SHA }}"
          echo "Result: ${{ steps.calc.outputs.llvm_rev }}"
