name: Calculate AOSP LLVM Revision (Corrected)

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'LLVM Commit Hash or Tag (e.g., ca7933e)'
        required: true
        default: 'ca7933e'

jobs:
  calculate-r-number:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch LLVM Metadata
        run: |
          # We need main branch and the target commit
          git clone --filter=blob:none --no-checkout https://github.com/llvm/llvm-project.git llvm_metadata
          cd llvm_metadata
          git fetch origin main
          git fetch origin ${{ github.event.inputs.commit_hash }}

      - name: Calculate Chronological R-Number
        id: get_count
        run: |
          cd llvm_metadata
          
          # 1. Get the date of the target commit
          COMMIT_DATE=$(git log -1 --format=%ct ${{ github.event.inputs.commit_hash }})
          echo "Commit Date Timestamp: $COMMIT_DATE"

          # 2. Count commits on 'main' that happened BEFORE or AT this date
          # This ensures the number grows over time regardless of branches
          COUNT=$(git rev-list --count --before=$COMMIT_DATE origin/main)
          
          echo "R_NUMBER=r$COUNT" >> $GITHUB_ENV
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          
      - name: Post to Summary
        run: |
          echo "### 🚀 AOSP LLVM Revision (Chronological)" >> $GITHUB_STEP_SUMMARY
          echo "This number represents the state of the 'main' branch when this release occurred." >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Commit** | \`${{ github.event.inputs.commit_hash }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **AOSP Revision** | \`${{ env.R_NUMBER }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use \`${{ env.R_NUMBER }}\` for your build to ensure it is seen as newer than r596125." >> $GITHUB_STEP_SUMMARY
