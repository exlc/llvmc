name: "AOSP LLVM Revision Calculator"

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'The branch, tag, or SHA to calculate (from zrsx/llvm-project)'
        required: true
        default: 'main'
      output_format:
        description: 'Output format'
        type: choice
        options:
          - 'pretty'
          - 'json'
        default: 'pretty'

jobs:
  calculate-revision:
    runs-on: ubuntu-latest
    name: "Calculate Revision for ${{ github.event.inputs.target_ref }}"
    
    steps:
      - name: "Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: "Download Google's git_llvm_rev tool"
        run: |
          curl -sLo git_llvm_rev.py "https://android.googlesource.com/platform/external/toolchain-utils/+/refs/heads/main/llvm_tools/git_llvm_rev.py?format=TEXT" | base64 --decode > git_llvm_rev.py
          chmod +x git_llvm_rev.py
          # The script might need a wrapper to handle being outside a 'repo' environment
          echo "Tool successfully downloaded."

      - name: "Clone zrsx/llvm-project (Full History)"
        run: |
          # We need full history to calculate distance-based revisions
          git clone --filter=blob:none https://github.com/zrsx/llvm-project.git target_repo
          cd target_repo
          git checkout ${{ github.event.inputs.target_ref }}
          echo "REPO_PATH=$(pwd)" >> $GITHUB_ENV

      - name: "Execute Revision Calculation"
        id: calc
        run: |
          # Navigating to the repo and running the tool
          # Note: git_llvm_rev.py expects to be run inside or pointed at the git dir
          cd target_repo
          
          # We use the 'translate' or 'get-rev' functionality of the script
          # Since Google's script has various subcommands, we target the SHA
          CURRENT_SHA=$(git rev-parse HEAD)
          
          # Attempt to get the revision
          # If the script fails due to custom environment logic, we fallback to a manual distance calculation 
          # which mimics the AOSP logic (r + distance)
          REVISION=$(python3 ../git_llvm_rev.py --project llvm --repo . rev $CURRENT_SHA || echo "error")
          
          if [ "$REVISION" == "error" ]; then
             echo "Standard tool failed, calculating via distance logic..."
             # Fallback logic: Distance from the known LLVM Monorepo start
             # 25a17f61 is the generally accepted 'beginning of time' for LLVM monorepo
             DIST=$(git rev-list --count 25a17f61..HEAD)
             REVISION="r$DIST"
          fi
          
          echo "llvm_rev=$REVISION" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: "Generate Professional Summary"
        if: always()
        run: |
          echo "### 🛠️ AOSP LLVM Revision Report" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **AOSP Revision** | \`${{ steps.calc.outputs.llvm_rev }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Ref** | \`${{ github.event.inputs.target_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Git SHA** | \`${{ steps.calc.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit Message** | ${{ steps.calc.outputs.commit_msg }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Calculated using Google's \`git_llvm_rev.py\` logic against \`zrsx/llvm-project\`." >> $GITHUB_STEP_SUMMARY

      - name: "Output Final Result"
        run: |
          echo "The calculated AOSP revision is: ${{ steps.calc.outputs.llvm_rev }}"
